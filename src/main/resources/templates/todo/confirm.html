<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">登録内容確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h4 mb-3" th:text="${pageTitle}">登録内容確認</h1>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <p class="mb-2"><strong>登録者:</strong> <span th:text="${todoForm.author}">name</span></p>
                    <p class="mb-2"><strong>タスク名:</strong> <span th:text="${todoForm.title}">title</span></p>
                    <p class="mb-2"><strong>詳細:</strong> <span th:text="${todoForm.detail}">detail</span></p>
                    <p class="mb-2"><strong>優先度:</strong> <span th:text="${todoForm.priority.displayName}">中</span></p>
                    <p class="mb-2"><strong>分野:</strong> <span th:text="${selectedSubject != null ? selectedSubject.fieldName + ' / ' + selectedSubject.majorName + ' / ' + selectedSubject.minorName : '-'}">分野</span></p>
                    <p class="mb-0"><strong>期限日:</strong> <span th:text="${todoForm.deadline != null ? #temporals.format(todoForm.deadline, 'yyyy-MM-dd') : '-'}">-</span></p>
                </div>
            </div>

            <form th:action="@{/todo/complete}" method="post">
                <input type="hidden" name="author" th:value="${todoForm.author}">
                <input type="hidden" name="title" th:value="${todoForm.title}">
                <input type="hidden" name="detail" th:value="${todoForm.detail}">
                <input type="hidden" name="priority" th:value="${todoForm.priority}">
                <input type="hidden" name="subjectId" th:value="${todoForm.subjectId}">
                <input type="hidden" name="deadline" th:value="${todoForm.deadline}">
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                    <button type="submit" class="btn btn-success">登録</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
