<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Confirm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h4 mb-3" th:text="${pageTitle}">Confirm</h1>

            <div class="card shadow-sm mb-4">
                <div class="card-header">Confirmation</div>
                <div class="card-body">
                    <h2 class="h6 text-muted mb-2">Title</h2>
                    <p class="mb-0" th:text="${todoTitle}">Sample Task</p>
                </div>
            </div>

            <form th:action="@{/todo/complete}" method="post">
                <input type="hidden" name="title" th:value="${todoTitle}">
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()" th:text="${backLabel}">Back</button>
                    <button type="submit" class="btn btn-success" th:text="${registerLabel}">Register</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
