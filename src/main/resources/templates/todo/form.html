<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習タスク作成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">学習タスク登録</h1>

                    <form th:action="@{/todo/confirm}" th:object="${todoForm}" method="post">
                        <div class="mb-3">
                            <label for="author" class="form-label">登録者</label>
                            <input type="text" id="author" th:field="*{author}" class="form-control" placeholder="名前">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">author error</p>
                        </div>

                        <div class="mb-3">
                            <label for="title" class="form-label">タスク名</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="学習内容を入力">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">title error</p>
                        </div>

                        <div class="mb-3">
                            <label for="detail" class="form-label">詳細</label>
                            <textarea id="detail" th:field="*{detail}" class="form-control" rows="3" placeholder="任意"></textarea>
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('detail')}" th:errors="*{detail}">detail error</p>
                        </div>

                        <div class="mb-3">
                            <label for="priority" class="form-label">優先度</label>
                            <select id="priority" th:field="*{priority}" class="form-select">
                                <option th:each="priority : ${T(com.example.demo.model.Priority).values()}"
                                        th:value="${priority}"
                                        th:text="${priority.displayName}">
                                    Medium
                                </option>
                            </select>
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}">priority error</p>
                        </div>

                        <div class="mb-3">
                            <label for="subjectId" class="form-label">分野</label>
                            <select id="subjectId" th:field="*{subjectId}" class="form-select">
                                <option th:each="subject : ${subjects}"
                                        th:value="${subject.id}"
                                        th:text="${subject.fieldName + ' / ' + subject.majorName + ' / ' + subject.minorName}">
                                    Subject
                                </option>
                            </select>
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('subjectId')}" th:errors="*{subjectId}">subject error</p>
                        </div>

                        <div class="mb-4">
                            <label for="deadline" class="form-label">期限日</label>
                            <input type="date" id="deadline" th:field="*{deadline}" class="form-control">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">確認画面へ</button>
                            <a class="btn btn-outline-secondary" th:href="@{/todo}">戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
