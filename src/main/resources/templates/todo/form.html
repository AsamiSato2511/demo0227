<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">Create Todo</h1>

                    <form th:action="@{/todo/confirm}" th:object="${todoForm}" method="post">
                        <div class="mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" id="author" th:field="*{author}" class="form-control" placeholder="Enter author">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Author error</p>
                        </div>

                        <div class="mb-4">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="Enter todo title">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</p>
                        </div>

                        <div class="mb-4">
                            <label for="detail" class="form-label">Detail</label>
                            <textarea id="detail" th:field="*{detail}" class="form-control" rows="4" placeholder="Enter detail (optional)"></textarea>
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('detail')}" th:errors="*{detail}">Detail error</p>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">&#x78BA;&#x8A8D;&#x753B;&#x9762;&#x3078;</button>
                            <a class="btn btn-outline-secondary" th:href="@{/todo}" href="/todo">&#x623B;&#x308B;</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
