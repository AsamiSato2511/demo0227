<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習タスク編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">学習タスク編集</h1>
                    <form th:action="@{/todo/{id}/update(id=${todo.id})}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">タスク名</label>
                            <input type="text" id="title" name="title" class="form-control" th:value="${todo.title}" required>
                        </div>

                        <div class="mb-3">
                            <label for="priority" class="form-label">優先度</label>
                            <select id="priority" name="priority" class="form-select">
                                <option th:each="priority : ${T(com.example.demo.model.Priority).values()}"
                                        th:value="${priority}"
                                        th:text="${priority.displayName}"
                                        th:selected="${todo.priority == priority}">
                                    中
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="subjectId" class="form-label">分野</label>
                            <select id="subjectId" name="subjectId" class="form-select">
                                <option th:each="subject : ${subjects}"
                                        th:value="${subject.id}"
                                        th:text="${subject.fieldName + ' / ' + subject.majorName + ' / ' + subject.minorName}"
                                        th:selected="${todo.subject != null and todo.subject.id == subject.id}">
                                    分野
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="deadline" class="form-label">期限日</label>
                            <input type="date" id="deadline" name="deadline" class="form-control" th:value="${todo.deadline}">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">更新</button>
                            <a class="btn btn-outline-secondary" th:href="@{/todo}">戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
