<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a class="btn btn-primary" th:href="@{/todo/new}">新規登録</a>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="px-3">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col">完了状態</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="px-3" th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">Sample Task</td>
                    <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0 bg-light" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">まずは新しいToDoを1件作成して、タスク管理を始めましょう。</p>
            <a class="btn btn-primary px-4" th:href="@{/todo/new}">新規作成</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
