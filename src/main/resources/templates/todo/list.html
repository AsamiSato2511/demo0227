<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .overdue-row td {
            background-color: #f8d7da !important;
        }
        .warning-row td {
            background-color: #fff3cd !important;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${successMessage}">ToDoを削除しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${errorMessage}">削除に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/todo}" method="get" class="row g-2 align-items-center mb-3">
        <div class="col-12 col-md-6">
            <input type="text" name="keyword" class="form-control" placeholder="タイトルで検索"
                   th:value="${keyword}">
        </div>
        <div class="col-12 col-md-3">
            <select name="categoryId" class="form-select">
                <option value="">すべてのカテゴリ</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}"
                        th:selected="${categoryId != null and categoryId == category.id}">
                    Category
                </option>
            </select>
        </div>
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="direction" th:value="${direction}">
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-primary">検索</button>
        </div>
        <div class="col-auto" th:if="${(keyword != null and !#strings.isEmpty(keyword)) or categoryId != null}">
            <a th:href="@{/todo(sort=${sort}, direction=${direction})}" class="btn btn-link">クリア</a>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/todo/export}">CSVダウンロード</a>
            <a class="btn btn-primary" th:href="@{/todo/new}">新規登録</a>
        </div>
    </div>
    <p class="text-muted mb-3">
        全<span th:text="${totalElements}">0</span>件中
        <span th:text="${startItem}">0</span>-<span th:text="${endItem}">0</span>件を表示
    </p>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="selectAll">
                    <label class="form-check-label" for="selectAll">全選択</label>
                </div>
                <form id="bulkDeleteForm" th:action="@{/todo/bulk-delete}" method="post"
                      onsubmit="return confirmBulkDelete();">
                    <button type="submit" class="btn btn-danger btn-sm">選択した項目を削除</button>
                </form>
            </div>
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="text-center" style="width: 48px;">選択</th>
                    <th scope="col" class="px-3">
                        <a class="text-decoration-none text-dark"
                           th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort='createdAt', direction=${sort == 'createdAt' and direction == 'asc' ? 'desc' : 'asc'}, page=0)}">
                            作成日
                            <span th:if="${sort == 'createdAt'}" th:text="${direction == 'asc' ? '▲' : '▼'}">▼</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="text-decoration-none text-dark"
                           th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort='title', direction=${sort == 'title' and direction == 'asc' ? 'desc' : 'asc'}, page=0)}">
                            タイトル
                            <span th:if="${sort == 'title'}" th:text="${direction == 'asc' ? '▲' : '▼'}">▼</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="text-decoration-none text-dark"
                           th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort='priority', direction=${sort == 'priority' and direction == 'asc' ? 'desc' : 'asc'}, page=0)}">
                            優先度
                            <span th:if="${sort == 'priority'}" th:text="${direction == 'asc' ? '▲' : '▼'}">▼</span>
                        </a>
                    </th>
                    <th scope="col">カテゴリ</th>
                    <th scope="col">
                        <a class="text-decoration-none text-dark"
                           th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort='deadline', direction=${sort == 'deadline' and direction == 'asc' ? 'desc' : 'asc'}, page=0)}">
                            期限日
                            <span th:if="${sort == 'deadline'}" th:text="${direction == 'asc' ? '▲' : '▼'}">▼</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a class="text-decoration-none text-dark"
                           th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort='completed', direction=${sort == 'completed' and direction == 'asc' ? 'desc' : 'asc'}, page=0)}">
                            ステータス
                            <span th:if="${sort == 'completed'}" th:text="${direction == 'asc' ? '▲' : '▼'}">▼</span>
                        </a>
                    </th>
                    <th scope="col" class="text-center">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}"
                    th:classappend="${todo.overdue} ? ' overdue-row' : (${todo.nearDeadline} ? ' warning-row' : (${todo.completed} ? ' table-secondary' : ''))">
                    <td class="text-center align-middle">
                        <input class="form-check-input js-row-checkbox" type="checkbox" name="ids"
                               th:value="${todo.id}" form="bulkDeleteForm">
                    </td>
                    <td class="px-3" th:text="${#temporals.format(todo.createdAt, 'yyyy-MM-dd HH:mm')}">2026-02-27 10:00</td>
                    <td th:text="${todo.title}" th:classappend="${todo.completed} ? ' text-decoration-line-through text-muted' : ''">Sample Task</td>
                    <td>
                        <span class="badge"
                              th:text="${todo.priority.displayName}"
                              th:classappend="' ' + ${todo.priority.cssClass}">中</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:text="${todo.category != null ? todo.category.name : 'カテゴリなし'}"
                              th:style="${todo.category != null ? 'background-color:' + todo.category.color + ';color:#fff;' : ''}">
                            Category
                        </span>
                    </td>
                    <td th:text="${todo.deadline != null ? #temporals.format(todo.deadline, 'yyyy-MM-dd') : '-'}">2026-02-27</td>
                    <td>
                        <span th:if="${todo.completed}" class="badge text-bg-success">完了</span>
                        <span th:unless="${todo.completed}" class="badge text-bg-secondary">未完了</span>
                    </td>
                    <td class="text-center">
                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline me-1">
                            <button type="submit" class="btn btn-outline-success btn-sm"
                                    th:text="${todo.completed} ? '未完了に戻す' : '完了にする'">完了にする</button>
                        </form>
                        <a class="btn btn-outline-primary btn-sm me-1"
                           th:href="@{/todo/{id}/edit(id=${todo.id})}">編集</a>
                        <button type="button" class="btn btn-danger btn-sm"
                                onclick="return confirm('本当に削除しますか？') && openDeleteModal(this);"
                                th:attr="data-id=${todo.id},data-title=${todo.title}">
                            削除
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm border-0 bg-light" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">まずは新しいToDoを1件作成して、タスク管理を始めましょう。</p>
            <a class="btn btn-primary px-4" th:href="@{/todo/new}">新規作成</a>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? ' disabled'">
                <a class="page-link" th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, direction=${direction}, page=${currentPage - 1})}">前へ</a>
            </li>
            <li class="page-item"
                th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${pageNumber == currentPage} ? ' active'">
                <a class="page-link"
                   th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, direction=${direction}, page=${pageNumber})}"
                   th:text="${pageNumber + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'">
                <a class="page-link" th:href="@{/todo(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, direction=${direction}, page=${currentPage + 1})}">次へ</a>
            </li>
        </ul>
    </nav>
</div>

<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteConfirmModalLabel">削除確認</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-2">本当に削除しますか？</p>
                <p class="text-muted small mb-0" id="deleteTargetTitle"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">キャンセル</button>
                <form id="deleteForm" method="post" class="d-inline">
                    <input type="hidden" name="_method" value="delete">
                    <button type="submit" class="btn btn-danger">削除する</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    document.querySelectorAll(".js-auto-dismiss").forEach(function (alertElement) {
        setTimeout(function () {
            var alertInstance = bootstrap.Alert.getOrCreateInstance(alertElement);
            alertInstance.close();
        }, 3000);
    });

    function confirmBulkDelete() {
        var selected = document.querySelectorAll(".js-row-checkbox:checked");
        if (selected.length === 0) {
            alert("削除するToDoを選択してください");
            return false;
        }
        return confirm("本当に削除しますか？");
    }

    var selectAllCheckbox = document.getElementById("selectAll");
    var rowCheckboxes = document.querySelectorAll(".js-row-checkbox");
    if (selectAllCheckbox) {
        selectAllCheckbox.addEventListener("change", function () {
            rowCheckboxes.forEach(function (checkbox) {
                checkbox.checked = selectAllCheckbox.checked;
            });
        });
        rowCheckboxes.forEach(function (checkbox) {
            checkbox.addEventListener("change", function () {
                var allChecked = Array.from(rowCheckboxes).every(function (item) {
                    return item.checked;
                });
                selectAllCheckbox.checked = allChecked;
            });
        });
    }

    function openDeleteModal(button) {
        var todoId = button.getAttribute("data-id");
        var todoTitle = button.getAttribute("data-title");
        var form = document.getElementById("deleteForm");
        var titleText = document.getElementById("deleteTargetTitle");
        form.setAttribute("action", "/todo/" + todoId);
        titleText.textContent = "対象: " + todoTitle;
        var modal = new bootstrap.Modal(document.getElementById("deleteConfirmModal"));
        modal.show();
        return false;
    }
</script>
</body>
</html>
