<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('ITパスポート合格支援ダッシュボード')}"></th:block>
    <style>
        .dense-page { padding: .45rem .5rem .6rem; }
        .dense-header { display:flex; justify-content:space-between; align-items:center; gap:.5rem; margin-bottom:.45rem; }
        .dense-title { margin:0; font-size:1.28rem; font-weight:700; letter-spacing:-.01em; }
        .dense-grid { display:grid; gap:.35rem; }
        .top-grid { grid-template-columns: 1.25fr .75fr; }
        .mid-grid { grid-template-columns: 1fr 1fr; }
        .panel { background:#fff; border:1px solid #e2e8f0; border-radius:.6rem; padding:.45rem .5rem; }
        .panel h2 { margin:0 0 .35rem; font-size:.84rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#334155; }
        .task-item, .weak-item { display:flex; justify-content:space-between; align-items:center; gap:.4rem; padding:.3rem .35rem; border:1px solid #e2e8f0; border-radius:.45rem; margin-bottom:.25rem; }
        .task-item:last-child, .weak-item:last-child { margin-bottom:0; }
        .name { font-size:.86rem; font-weight:600; color:#0f172a; }
        .meta { font-size:.73rem; color:#64748b; }
        .btn-mini { border:1px solid #cbd5e1; background:#fff; color:#334155; border-radius:.4rem; padding:.22rem .42rem; font-size:.72rem; text-decoration:none; display:inline-flex; align-items:center; }
        .btn-mini.primary { background:#2563eb; border-color:#2563eb; color:#fff; }
        .kpi-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.3rem; }
        .kpi { border:1px solid #e2e8f0; border-radius:.45rem; padding:.3rem .4rem; }
        .kpi .k { font-size:.64rem; color:#64748b; text-transform:uppercase; letter-spacing:.06em; }
        .kpi .v { font-size:1.02rem; font-weight:700; line-height:1.1; color:#0f172a; }
        .progress-wrap { margin-top:.35rem; }
        .progress-label { display:flex; justify-content:space-between; font-size:.7rem; color:#64748b; margin-bottom:.12rem; }
        .progress-bar { height:8px; width:100%; background:#e2e8f0; border-radius:999px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:999px; }
        .chip { display:inline-flex; align-items:center; border-radius:999px; padding:.08rem .42rem; font-size:.68rem; font-weight:700; }
        .chip.danger { background:#fee2e2; color:#991b1b; }
        .chip.warn { background:#fef3c7; color:#92400e; }
        .chip.ok { background:#dcfce7; color:#166534; }
        .mini-list { margin:0; padding-left:.95rem; }
        .mini-list li { font-size:.76rem; color:#475569; margin-bottom:.12rem; }
        .mini-list li:last-child { margin-bottom:0; }
        .foot-row { display:grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap:.35rem; margin-top:.45rem; }
        .foot-cell { border:1px solid #e2e8f0; border-radius:.45rem; padding:.26rem .34rem; background:#f8fafc; }
        .foot-cell .k { font-size:.62rem; color:#64748b; text-transform:uppercase; }
        .foot-cell .v { font-size:.74rem; color:#0f172a; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tool-row { display:flex; gap:.3rem; flex-wrap:wrap; margin-top:.35rem; }
        .tool-inline { display:flex; gap:.25rem; align-items:center; }
        .tool-inline input[type='date'] { height:28px; font-size:.74rem; padding:.15rem .3rem; }
        .tool-inline input[type='file'] { font-size:.72rem; max-width:210px; }
        @media (max-width: 1100px) { .foot-row { grid-template-columns: repeat(3,minmax(0,1fr)); } }
        @media (max-width: 920px) {
            .top-grid, .mid-grid { grid-template-columns:1fr; }
            .foot-row { grid-template-columns: repeat(2,minmax(0,1fr)); }
            .dense-page { padding:.4rem .45rem .55rem; }
        }
        @media (max-width: 560px) {
            .foot-row { grid-template-columns:1fr; }
            .dense-title { font-size:1.08rem; }
        }
    </style>
</head>
<body>
<div class="page-wrap dense-page">
    <div class="dense-header">
        <h1 class="dense-title">ITパスポート合格支援ダッシュボード</h1>
        <a class="btn-mini" th:href="@{/words}">単語帳</a>
    </div>

    <th:block th:replace="~{fragments/layout :: flash(${successMessage}, ${errorMessage})}"></th:block>

    <div class="dense-grid top-grid">
        <section class="panel">
            <h2>今日やること</h2>
            <div th:if="${#lists.isEmpty(priorityLearnings)}" class="meta">優先学習候補がありません。</div>
            <div th:if="${!#lists.isEmpty(priorityLearnings)}">
                <div class="task-item" th:each="p, s : ${priorityLearnings}" th:if="${s.index < 3}">
                    <div>
                        <div class="name" th:text="${p.minorName}">minor</div>
                        <div class="meta" th:text="${'正答率 ' + p.correctRate + '% / 誤答 ' + p.recentWrongCount + '件'}">meta</div>
                    </div>
                    <a class="btn-mini primary" th:href="@{/words/quiz(minorName=${p.minorName})}">学習</a>
                </div>
            </div>
            <ul class="mini-list" th:if="${!#lists.isEmpty(adviceLines)}" style="margin-top:.3rem;">
                <li th:each="line, stat : ${adviceLines}" th:if="${stat.index < 2}" th:text="${line}">advice</li>
            </ul>
        </section>

        <section class="panel">
            <h2>進捗サマリー</h2>
            <div class="kpi-grid">
                <div class="kpi"><div class="k">最新得点</div><div class="v" th:text="${latestScore + '点'}">0点</div></div>
                <div class="kpi"><div class="k">合格まで</div><div class="v" th:text="${remainToPass + '点'}">0点</div></div>
                <div class="kpi"><div class="k">合格確率</div><div class="v" th:text="${forecast.passProbability + '%'}">0%</div></div>
                <div class="kpi"><div class="k">試験まで</div><div class="v" th:text="${daysUntilExam + '日'}">0日</div></div>
            </div>
            <div class="progress-wrap">
                <div class="progress-label"><span>到達度</span><span th:text="${latestScore + '/' + passLine}">0/70</span></div>
                <div class="progress-bar"><div class="progress-fill" th:style="'width:' + ${progressPercent} + '%;background:' + ${progressColor}"></div></div>
            </div>
            <div class="meta" style="margin-top:.24rem;">前回比:
                <span th:style="${previousDiff >= 0} ? 'color:#16a34a;font-weight:700;' : 'color:#dc2626;font-weight:700;'"
                      th:text="${previousDiff >= 0 ? '+' + previousDiff + '点' : previousDiff + '点'}">+0点</span>
            </div>
        </section>
    </div>

    <div class="dense-grid mid-grid" style="margin-top:.45rem;">
        <section class="panel">
            <h2>弱点TOP</h2>
            <div th:if="${#lists.isEmpty(bottleneckTop3)}" class="meta">弱点データがありません。</div>
            <div th:if="${!#lists.isEmpty(bottleneckTop3)}">
                <div class="weak-item" th:each="row : ${bottleneckTop3}">
                    <div>
                        <div class="name" th:text="${row.name}">name</div>
                        <span class="chip danger" th:text="${row.correctRate + '%'}">0%</span>
                    </div>
                    <a class="btn-mini" th:href="@{/words/quiz(minorName=${row.name})}">10問</a>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>次に着手する項目</h2>
            <div th:if="${#lists.isEmpty(weakWords)}" class="meta">候補がありません。</div>
            <div th:if="${!#lists.isEmpty(weakWords)}">
                <div class="weak-item" th:each="w, s : ${weakWords}" th:if="${s.index < 3}">
                    <div>
                        <div class="name" th:text="${w.term}">term</div>
                        <div class="meta" th:text="${w.minorName + ' / 誤答 ' + w.wrongCount}">meta</div>
                    </div>
                    <a class="btn-mini primary" th:href="@{/words/quiz(minorName=${w.minorName})}">復習</a>
                </div>
            </div>
        </section>
    </div>

    <section class="panel" style="margin-top:.45rem;">
        <div class="tool-row">
            <form th:action="@{/study/exam-date}" th:object="${examSettingForm}" method="post" class="tool-inline">
                <input type="date" th:field="*{examDate}" class="form-control">
                <button class="btn-mini" type="submit">試験日更新</button>
            </form>
            <form th:action="@{/study/import}" method="post" enctype="multipart/form-data" class="tool-inline">
                <input type="file" name="file" class="form-control" accept=".csv" required>
                <button class="btn-mini" type="submit">CSV取込</button>
            </form>
        </div>
    </section>

    <section class="panel" style="margin-top:.45rem;">
        <h2>得点推移</h2>
        <canvas id="scoreTrendChart" height="86"></canvas>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const labels = /*[[${trendLabels}]]*/ [];
    const scores = /*[[${trendScores}]]*/ [];
    const passLine = /*[[${passLine}]]*/ 70;
    const passLineArray = labels.map(() => passLine);
    const ctx = document.getElementById('scoreTrendChart');
    if (ctx && labels.length > 0) {
        new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Score',
                        data: scores,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,0.16)',
                        fill: true,
                        tension: .25,
                        pointRadius: 1.8
                    },
                    {
                        label: 'Pass',
                        data: passLineArray,
                        borderColor: '#dc2626',
                        borderDash: [4, 4],
                        pointRadius: 0,
                        tension: 0
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { min: 0, max: 100, ticks: { stepSize: 20 } },
                    x: { ticks: { maxTicksLimit: 6 } }
                }
            }
        });
    }
</script>
</body>
</html>
