<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去問結果確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h4 mb-3">過去問結果の確認</h1>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <p class="mb-2"><strong>受験日:</strong> <span th:text="${#temporals.format(examResultForm.takenOn, 'yyyy-MM-dd')}">2026-02-27</span></p>
                    <p class="mb-2"><strong>回・年度:</strong> <span th:text="${examResultForm.source}">令和7年 春</span></p>
                    <p class="mb-2"><strong>得点:</strong> <span th:text="${examResultForm.scoreTotal + '点'}">60点</span></p>
                    <p class="mb-0"><strong>メモ:</strong> <span th:text="${examResultForm.memo}">memo</span></p>
                </div>
            </div>

            <form th:action="@{/study/results}" method="post">
                <input type="hidden" name="takenOn" th:value="${examResultForm.takenOn}">
                <input type="hidden" name="source" th:value="${examResultForm.source}">
                <input type="hidden" name="scoreTotal" th:value="${examResultForm.scoreTotal}">
                <input type="hidden" name="memo" th:value="${examResultForm.memo}">
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                    <button type="submit" class="btn btn-success">登録</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
