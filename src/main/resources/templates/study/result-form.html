<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去問結果登録</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">過去問結果登録</h1>
                    <form th:action="@{/study/results/confirm}" th:object="${examResultForm}" method="post">
                        <div class="mb-3">
                            <label for="takenOn" class="form-label">受験日</label>
                            <input id="takenOn" type="date" th:field="*{takenOn}" class="form-control">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('takenOn')}" th:errors="*{takenOn}">error</p>
                        </div>
                        <div class="mb-3">
                            <label for="source" class="form-label">回・年度</label>
                            <input id="source" type="text" th:field="*{source}" class="form-control" placeholder="例: 令和7年 春">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('source')}" th:errors="*{source}">error</p>
                        </div>
                        <div class="mb-3">
                            <label for="scoreTotal" class="form-label">得点（0〜100）</label>
                            <input id="scoreTotal" type="number" min="0" max="100" th:field="*{scoreTotal}" class="form-control">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('scoreTotal')}" th:errors="*{scoreTotal}">error</p>
                        </div>
                        <div class="mb-4">
                            <label for="memo" class="form-label">メモ</label>
                            <textarea id="memo" th:field="*{memo}" class="form-control" rows="3"></textarea>
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('memo')}" th:errors="*{memo}">error</p>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">確認画面へ</button>
                            <a class="btn btn-outline-secondary" th:href="@{/study}">戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
