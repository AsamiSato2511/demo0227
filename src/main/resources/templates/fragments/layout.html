<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="commonHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">IT Passport App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/ui-kit.css}">
</th:block>

<th:block th:fragment="flash(successMessage, errorMessage)">
    <div th:if="${successMessage}" class="alert alert-success section-stack" th:text="${successMessage}">success</div>
    <div th:if="${errorMessage}" class="alert alert-danger section-stack" th:text="${errorMessage}">error</div>
</th:block>
</body>
</html>
