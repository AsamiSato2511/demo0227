<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 860px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">単語編集</h1>
        <a class="btn btn-outline-secondary" th:href="@{/words}">一覧へ戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/words/{id}/edit(id=${word.id})}" method="post" class="row g-3">
                <div class="col-12">
                    <label class="form-label">用語</label>
                    <input class="form-control" type="text" name="term" th:value="${word.term}" required>
                </div>

                <div class="col-12">
                    <label class="form-label">解説</label>
                    <textarea class="form-control" name="meaning" rows="3" required th:text="${word.meaning}">meaning</textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">中分類</label>
                    <select name="minorName" class="form-select" required>
                        <option th:each="m : ${minorNames}" th:value="${m}" th:text="${m}" th:selected="${m == word.minorName}">中分類</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">ステータス</label>
                    <select name="status" class="form-select">
                        <option value="学習中" th:selected="${word.status == '学習中'}">学習中</option>
                        <option value="要復習" th:selected="${word.status == '要復習'}">要復習</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">誤答数</label>
                    <input class="form-control" type="number" name="wrongCount" min="0" th:value="${word.wrongCount}">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="quizEnabled" name="quizEnabled" th:checked="${word.quizEnabled}">
                        <label class="form-check-label" for="quizEnabled">クイズ対象</label>
                    </div>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">保存</button>
                    <a class="btn btn-outline-secondary" th:href="@{/words}">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
