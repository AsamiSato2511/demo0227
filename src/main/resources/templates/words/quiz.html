<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語クイズ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">単語クイズ</h1>
        <a class="btn btn-outline-secondary" th:href="@{/words(minorName=${minorName})}">一覧へ戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="text-muted mb-2" th:text="${index + ' / ' + total}">1 / 10</div>
            <h2 class="h4 mb-3" th:text="${current.term}">term</h2>

            <form th:if="${!isAnswered}" th:action="@{/words/quiz/answer}" method="post">
                <input type="hidden" name="minorName" th:value="${minorName}">
                <div class="list-group mb-3">
                    <label class="list-group-item" th:each="opt, stat : ${current.options}">
                        <input class="form-check-input me-2" type="radio" name="choiceIndex" th:value="${stat.index}" required>
                        <span th:text="${opt}">option</span>
                    </label>
                </div>
                <button class="btn btn-primary" type="submit">回答する</button>
            </form>

            <div th:if="${isAnswered}">
                <div th:if="${current.correct}" class="alert alert-success mb-2">〇 正解</div>
                <div th:unless="${current.correct}" class="alert alert-danger mb-2">× 不正解</div>
                <div class="mb-3">
                    <div class="fw-semibold">解説</div>
                    <div th:text="${current.correctMeaning}">meaning</div>
                </div>
                <form th:action="@{/words/quiz/next}" method="post">
                    <input type="hidden" name="minorName" th:value="${minorName}">
                    <button class="btn btn-success" type="submit">次へ</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
