<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('10問クイズ')}"></th:block>
    <style>
        .quiz-shell { max-width: 720px; margin: 0 auto; }
        .judge-mark { font-size: 2.15rem; font-weight: 800; line-height: 1; }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="quiz-shell">
        <div class="section-stack d-flex justify-content-between align-items-center" style="gap:.5rem;flex-wrap:wrap;">
            <h1 class="page-title" style="font-size:1.55rem;" th:text="${mode == 'REVIEW'} ? '間違い復習クイズ' : '10問クイズ'">10問クイズ</h1>
            <a class="secondary-button" th:href="@{/words(minorName=${minorName})}">一覧へ戻る</a>
        </div>

        <div style="font-size:.84rem;color:var(--text-sub);margin-bottom:.35rem;" th:text="${index + ' / ' + total}">1 / 10</div>
        <div class="progress-bar section-stack"><div class="progress-fill" style="background:var(--primary);" th:styleappend="'width:' + ${progressPercent} + '%'" ></div></div>

        <section class="dashboard-card section-stack" style="text-align:center;">
            <div class="section-index">問題</div>
            <h2 class="section-title" style="font-size:1.35rem;margin-bottom:0;" th:text="${current.term}">term</h2>
        </section>

        <form id="answerForm" th:action="@{/words/quiz/answer}" method="post">
            <input type="hidden" name="minorName" th:value="${minorName}">
            <input type="hidden" name="mode" th:value="${mode}">
            <input type="hidden" name="choiceIndex" id="choiceIndex">
        </form>

        <div class="section-stack" style="display:grid;gap:.55rem;">
            <div th:each="opt, stat : ${current.options}">
                <button type="button"
                        class="quiz-option-card"
                        th:classappend="${isAnswered} ? (${opt == correctMeaning} ? ' quiz-option-correct' : (${stat.index == selectedChoice} ? ' quiz-option-wrong' : ' quiz-option-muted')) : ''"
                        th:disabled="${isAnswered}"
                        th:onclick="|submitChoice(${stat.index})|">
                    <span th:text="${opt}">option</span>
                </button>
            </div>
        </div>

        <section class="dashboard-card section-stack" th:if="${isAnswered}" style="text-align:center;">
            <div class="judge-mark" th:if="${isCorrect}" style="color:var(--success);">〇 正解</div>
            <div class="judge-mark" th:unless="${isCorrect}" style="color:var(--danger);">× 不正解</div>
            <div class="section-title" style="font-size:.95rem;margin:.55rem 0 .2rem;">正解・解説</div>
            <p style="margin:0;color:var(--text-sub);" th:text="${explanation}">meaning</p>
        </section>

        <form th:if="${isAnswered}" th:action="@{/words/quiz/next}" method="post">
            <input type="hidden" name="minorName" th:value="${minorName}">
            <input type="hidden" name="mode" th:value="${mode}">
            <button class="cta-button" style="width:100%;" type="submit">次へ</button>
        </form>
    </div>
</div>

<script>
    function submitChoice(index) {
        const input = document.getElementById('choiceIndex');
        if (!input) return;
        input.value = index;
        document.getElementById('answerForm').submit();
    }
</script>
</body>
</html>
