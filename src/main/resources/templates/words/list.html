<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語帳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">単語帳</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/study}">ダッシュボード</a>
            <a class="btn btn-primary" th:href="@{/words/quiz(minorName=${minorName})}">10問クイズ開始</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">success</div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">error</div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h2 class="h6 mb-2">単語CSV取込</h2>
            <form th:action="@{/words/import}" method="post" enctype="multipart/form-data" class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">CSVファイル（term,meaning,minor_name,status,wrong_count）</label>
                    <input type="file" name="file" class="form-control" accept=".csv" required>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100" type="submit">取り込む</button>
                </div>
            </form>
        </div>
    </div>

    <form th:action="@{/words}" method="get" class="row g-2 mb-3">
        <div class="col-md-4">
            <input class="form-control" type="text" name="keyword" th:value="${keyword}" placeholder="キーワード">
        </div>
        <div class="col-md-4">
            <input class="form-control" type="text" name="minorName" th:value="${minorName}" placeholder="中分類">
        </div>
        <div class="col-md-2">
            <select name="status" class="form-select">
                <option value="all" th:selected="${status == 'all'}">すべて</option>
                <option value="学習中" th:selected="${status == '学習中'}">学習中</option>
                <option value="習得" th:selected="${status == '習得'}">習得</option>
                <option value="要復習" th:selected="${status == '要復習'}">要復習</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-primary w-100" type="submit">絞り込み</button>
        </div>
    </form>

    <div class="table-responsive bg-white rounded shadow-sm">
        <table class="table table-striped mb-0">
            <thead>
            <tr>
                <th>用語</th>
                <th>意味</th>
                <th>中分類</th>
                <th>状態</th>
                <th>誤答回数</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(words)}">
                <td colspan="5" class="text-center text-muted">単語がありません</td>
            </tr>
            <tr th:each="w : ${words}">
                <td th:text="${w.term}">term</td>
                <td th:text="${w.meaning}">meaning</td>
                <td th:text="${w.minorName}">minor</td>
                <td th:text="${w.status}">学習中</td>
                <td th:text="${w.wrongCount}">0</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
