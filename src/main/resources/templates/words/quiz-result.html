<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ結果</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="h3 mb-3">クイズ結果</h1>
    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="h5" th:text="${correct + ' / ' + total + '問 正解'}">0/10問 正解</div>
            <div class="h4 text-primary" th:text="${rate + '%'}">0%</div>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h2 class="h6 mb-3">間違えた問題</h2>
            <div th:if="${#lists.isEmpty(wrongQuestions)}" class="text-muted">全問正解です。</div>
            <ul class="list-group" th:if="${!#lists.isEmpty(wrongQuestions)}">
                <li class="list-group-item" th:each="q : ${wrongQuestions}">
                    <div class="fw-semibold" th:text="${q.term}">term</div>
                    <div class="small text-muted" th:text="${q.correctMeaning}">meaning</div>
                </li>
            </ul>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a class="btn btn-primary" th:href="@{/words/quiz}">もう一度10問</a>
        <a class="btn btn-outline-secondary" th:href="@{/words}">単語帳へ戻る</a>
    </div>
</div>
</body>
</html>
