<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: commonHead('クイズ結果')}"></th:block>
    <style>
        .result-shell { max-width: 760px; margin: 0 auto; position: relative; }
        .tier-base { border-radius: 1rem; border: 1px solid var(--border-default); }
        .tier-low { background: linear-gradient(135deg, #f8fafc, #eef2f7); color: #475569; }
        .tier-mid { background: linear-gradient(135deg, #eff6ff, #f8fbff); color: #1e3a8a; }
        .tier-high { background: linear-gradient(135deg, #fff7d8, #ffe9b2); color: #92400e; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .tier-perfect { background: linear-gradient(135deg, #fde68a, #fbbf24, #f59e0b); color: #78350f; box-shadow: 0 14px 34px rgba(245, 158, 11, .34); overflow: hidden; }
        .wrong-list { max-height: 320px; overflow: auto; }
        .confetti-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .confetti { position: absolute; top: -20px; width: 10px; height: 16px; opacity: .9; animation: fall 2.8s linear infinite; }
        .confetti:nth-child(3n) { background: #ff4d6d; }
        .confetti:nth-child(3n+1) { background: #00c2ff; }
        .confetti:nth-child(3n+2) { background: #ffee32; }
        .confetti:nth-child(1) { left: 4%; animation-delay: .1s; }
        .confetti:nth-child(2) { left: 9%; animation-delay: .3s; }
        .confetti:nth-child(3) { left: 14%; animation-delay: .6s; }
        .confetti:nth-child(4) { left: 19%; animation-delay: .9s; }
        .confetti:nth-child(5) { left: 24%; animation-delay: 1.2s; }
        .confetti:nth-child(6) { left: 29%; animation-delay: .4s; }
        .confetti:nth-child(7) { left: 34%; animation-delay: .7s; }
        .confetti:nth-child(8) { left: 39%; animation-delay: 1.0s; }
        .confetti:nth-child(9) { left: 44%; animation-delay: 1.3s; }
        .confetti:nth-child(10) { left: 49%; animation-delay: .2s; }
        .confetti:nth-child(11) { left: 54%; animation-delay: .5s; }
        .confetti:nth-child(12) { left: 59%; animation-delay: .8s; }
        .confetti:nth-child(13) { left: 64%; animation-delay: 1.1s; }
        .confetti:nth-child(14) { left: 69%; animation-delay: 1.4s; }
        .confetti:nth-child(15) { left: 74%; animation-delay: .15s; }
        .confetti:nth-child(16) { left: 79%; animation-delay: .45s; }
        .confetti:nth-child(17) { left: 84%; animation-delay: .75s; }
        .confetti:nth-child(18) { left: 89%; animation-delay: 1.05s; }
        .confetti:nth-child(19) { left: 94%; animation-delay: 1.35s; }
        .confetti:nth-child(20) { left: 97%; animation-delay: .95s; }
        @keyframes fall { 0% { transform: translateY(-30px) rotate(0deg); } 100% { transform: translateY(420px) rotate(300deg); } }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="result-shell">
        <div class="confetti-layer" th:if="${resultTier == 'PERFECT'}">
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
            <span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span><span class="confetti"></span>
        </div>

        <h1 class="page-title" style="text-align:center;margin-bottom:1rem;">クイズ結果</h1>
        <section class="dashboard-card tier-base section-stack"
                 th:classappend="${resultTier == 'LOW'} ? ' tier-low' : (${resultTier == 'MID'} ? ' tier-mid' : (${resultTier == 'HIGH'} ? ' tier-high' : ' tier-perfect'))"
                 style="text-align:center;">
            <div class="h3" style="font-weight:800;margin-bottom:.5rem;" th:if="${resultTier == 'PERFECT'}">🎉 PERFECT</div>
            <p style="font-size:.86rem;margin-bottom:.55rem;"
               th:text="${resultTier == 'LOW'} ? '落ち着いて弱点を回収するターンです' : (${resultTier == 'MID'} ? '安定して伸びています' : (${resultTier == 'HIGH'} ? 'かなり良い仕上がりです' : '全問正解！本番レベルです'))">message</p>
            <div style="font-size:2.2rem;font-weight:800;line-height:1.1;" th:text="${correct + ' / ' + total}">0 / 10</div>
            <div style="font-size:1.2rem;font-weight:700;" th:text="${rate + '%'}">0%</div>
        </section>

        <section class="dashboard-card section-stack">
            <h2 class="section-title">間違えた問題と正解解説</h2>
            <div th:if="${#lists.isEmpty(wrongQuestions)}" class="status-chip chip-success">全問正解です。</div>
            <ul th:if="${!#lists.isEmpty(wrongQuestions)}" class="list-group wrong-list" style="margin:0;">
                <li class="list-group-item" th:each="q : ${wrongQuestions}" style="border-color:#e2e8f0;">
                    <div style="font-weight:600;" th:text="${q.term}">term</div>
                    <div style="font-size:.84rem;color:var(--text-sub);" th:text="${q.correctMeaning}">meaning</div>
                </li>
            </ul>
        </section>

        <div class="d-grid" style="gap:.55rem;grid-template-columns:1fr;">
            <a class="cta-button" th:href="@{/words/quiz}">もう10問</a>
            <form th:if="${mode != 'REVIEW'}" th:action="@{/words/quiz/retry-wrong}" method="post">
                <button class="secondary-button" style="width:100%;" type="submit">間違いだけ復習</button>
            </form>
            <a class="secondary-button" th:href="@{/words}">一覧へ戻る</a>
        </div>
    </div>
</div>
</body>
</html>
